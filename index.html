<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Uma Musume...</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #fcfcfc; 
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #ff80ab; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { margin-top: 20px; color: #444; font-weight: 500; }
        .btn { 
            margin-top: 15px; 
            padding: 12px 24px; 
            background: #ff80ab; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p id="status">Launching Uma Musume...</p>
    <a id="fallback-btn" class="btn" style="display:none;">Download from Store</a>

    <script>
        // Use window.location.replace to avoid back-button loops
        const appUri = "com.cygames.umamusume://";
        const iosStore = "https://apps.apple.com/us/app/id6480433538";
        const androidStore = "https://play.google.com/store/apps/details?id=com.cygames.umamusume";

        // Try to launch the app immediately
        window.location.replace(appUri);

        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

        // Fast fallback if app is not installed
        setTimeout(function() {
            window.location.replace(isIOS ? iosStore : androidStore);
        }, 1500); // 1.5 seconds is enough for the "Open in App" prompt
    </script>
</body>
</html>
